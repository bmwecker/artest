<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR модель с музыкой</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    model-viewer { width: 100%; height: 100vh; background: white; }
    .ar-button, .music-button {
      position: fixed;
      bottom: 30px;
      transform: translateX(-50%);
      background: #007aff;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 1000;
      cursor: pointer;
      transition: background 0.2s;
    }
    .ar-button { left: 30%; }
    .music-button { left: 70%; background: #34c759; }
    .music-button.playing { background: #ff3b30; }
    .music-button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <model-viewer 
    id="modelViewer"
    src="textured_mesh.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    environment-image="neutral"
    shadow-intensity="1"
    alt="3D модель">
  </model-viewer>

  <button id="arButton" class="ar-button">📱 Смотреть в AR</button>
  <button id="musicButton" class="music-button">🎵 Музыка выкл</button>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const modelViewer = document.getElementById('modelViewer');
    const arButton = document.getElementById('arButton');
    const musicButton = document.getElementById('musicButton');
    const bgMusic = document.getElementById('bgMusic');

    // Управление AR
    modelViewer.addEventListener('load', () => {
      arButton.disabled = !modelViewer.canActivateAR;
    });
    arButton.addEventListener('click', () => {
      if (modelViewer.canActivateAR) modelViewer.activateAR();
    });

    // Управление музыкой
    let isPlaying = false;
    musicButton.addEventListener('click', () => {
      if (isPlaying) {
        bgMusic.pause();
        musicButton.textContent = '🎵 Музыка выкл';
        musicButton.classList.remove('playing');
      } else {
        bgMusic.play().catch(e => alert('Не удалось воспроизвести музыку: ' + e));
        musicButton.textContent = '🎵 Музыка вкл';
        musicButton.classList.add('playing');
      }
      isPlaying = !isPlaying;
    });
  </script>
</body>
</html>
