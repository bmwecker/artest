<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR модель</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }
    model-viewer {
      width: 100%;
      height: 100vh;
      background-color: #ffffff;
    }
    .ar-button {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 18px;
      pointer-events: none; /* кнопка неактивна, т.к. model-viewer сам показывает AR-кнопку */
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <model-viewer 
    src="textured_mesh.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    camera-controls
    auto-rotate
    rotation-per-second="30deg"
    environment-image="neutral"
    shadow-intensity="1"
    exposure="0.8"
    alt="3D модель">
  </model-viewer>
  <div class="ar-button">Нажмите на иконку AR (куб) чтобы увидеть в реальности</div>
</body>
</html>
