<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR модель с музыкой и фото</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    /* --- ЧЁРНЫЙ ФОН, ЗОЛОТОЙ ТЕКСТ, БОЛЬШИЕ КНОПКИ (как в последней рабочей версии) --- */
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: black;
    }
    model-viewer {
      width: 100%;
      height: 100vh;
      background: black;
    }
    .button-panel {
      position: fixed;
      bottom: 60px;
      left: 0;
      right: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      z-index: 10000;
      pointer-events: none;
      padding: 0 10px;
    }
    .button-panel button {
      pointer-events: auto;
      width: min(270px, 40vw);
      height: auto;
      aspect-ratio: 1/1;
      border-radius: 50%;
      border: 2px solid rgba(252, 215, 128, 0.5);
      background: rgba(0, 0, 0, 0.6);
      color: #FCD780;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .button-panel button:hover {
      border-color: #FCD780;
      background: rgba(20, 20, 20, 0.8);
      transform: scale(1.02);
    }
    .button-panel button:active {
      transform: scale(0.95);
    }
    .button-panel button span:first-child {
      font-size: min(180px, 25vw);
      line-height: 1;
    }
    .button-panel button span:last-child {
      font-size: min(48px, 7vw);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.9;
      color: #FCD780;
    }
    .button-panel button.music-off {
      border-color: rgba(252, 215, 128, 0.4);
    }
    .button-panel button.music-on {
      border-color: #FCD780;
      background: rgba(252, 215, 128, 0.1);
      box-shadow: 0 0 30px rgba(252, 215, 128, 0.3);
    }
    .button-panel button:disabled {
      opacity: 0.4;
      transform: none;
      pointer-events: none;
      border-color: rgba(255,255,255,0.3);
    }
    .note {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #FCD780;
      font-size: min(32px, 6vw);
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 30px;
      backdrop-filter: blur(4px);
      z-index: 9999;
      font-weight: 500;
      border-radius: 60px;
      border: 1px solid rgba(252, 215, 128, 0.3);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      white-space: nowrap;
    }
    @media (max-width: 480px) {
      .note {
        top: 20px;
        font-size: 20px;
        padding: 8px 16px;
        white-space: normal;
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="note" id="platformNote">
    ⚡ Нажми AR, затем сделай системный скриншот (кнопки питания + громкости)
  </div>

  <model-viewer 
    id="modelViewer"
    src="textured_mesh.glb"   <!-- замените на свою модель -->
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    environment-image="neutral"
    shadow-intensity="1"
    alt="3D модель">
  </model-viewer>

  <div class="button-panel">
    <button id="arButton" class="ar-button">
      <span>📱</span>
      <span>AR</span>
    </button>
    <button id="musicButton" class="music-off">
      <span>🔇</span>
      <span>MUSIC</span>
    </button>
    <button id="photoButton">
      <span>📸</span>
      <span>PHOTO</span>
    </button>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">   <!-- замените на свою музыку -->
  </audio>

  <script>
    (function() {
      const modelViewer = document.getElementById('modelViewer');
      const arButton = document.getElementById('arButton');
      const musicButton = document.getElementById('musicButton');
      const photoButton = document.getElementById('photoButton');
      const bgMusic = document.getElementById('bgMusic');
      const platformNote = document.getElementById('platformNote');

      // --- Запуск AR (как в рабочей версии, без лишних проверок) ---
      arButton.addEventListener('click', () => {
        if (modelViewer.canActivateAR) {
          modelViewer.activateAR();
        } else {
          // Пытаемся запустить принудительно – иногда canActivateAR ошибается
          try {
            modelViewer.activateAR();
          } catch (e) {
            alert('AR не запускается. Возможно, требуется установить ARCore (Google Play Services для AR) или обновить браузер.');
          }
        }
      });

      // --- Музыка (переключение) ---
      let isPlaying = false;
      musicButton.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isPlaying) {
          bgMusic.pause();
          musicButton.classList.remove('music-on');
          musicButton.classList.add('music-off');
          musicButton.innerHTML = '<span>🔇</span><span>MUSIC</span>';
          isPlaying = false;
        } else {
          bgMusic.play()
            .then(() => {
              musicButton.classList.remove('music-off');
              musicButton.classList.add('music-on');
              musicButton.innerHTML = '<span>🔊</span><span>MUSIC</span>';
              isPlaying = true;
            })
            .catch((err) => {
              console.warn('Ошибка воспроизведения:', err);
              alert('Не удалось включить музыку. Нажми ещё раз.');
            });
        }
      });

      bgMusic.addEventListener('ended', () => {
        isPlaying = false;
        musicButton.classList.remove('music-on');
        musicButton.classList.add('music-off');
        musicButton.innerHTML = '<span>🔇</span><span>MUSIC</span>';
      });

      // --- Фото в режиме предпросмотра (используем встроенный метод model-viewer) ---
      photoButton.addEventListener('click', () => {
        platformNote.innerHTML = '📸 Снимок...';
        try {
          const screenshotData = modelViewer.toDataURL();
          if (screenshotData) {
            const link = document.createElement('a');
            link.download = 'model-preview.png';
            link.href = screenshotData;
            link.click();
            platformNote.innerHTML = '⚡ Нажми AR, затем сделай системный скриншот';
          } else {
            throw new Error('Снимок не получен');
          }
        } catch (e) {
          console.error('Ошибка фото:', e);
          alert('Не удалось сделать снимок. Попробуй ещё раз.');
          platformNote.innerHTML = '⚡ Нажми AR, затем сделай системный скриншот';
        }
      });

      // --- Определение iOS для подсказки ---
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS) {
        platformNote.innerHTML = '📱 На iOS: системный скриншот (боковая кнопка + громкость)';
      }
    })();
  </script>
</body>
</html>
