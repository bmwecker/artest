<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR model with music</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      background: white;
    }
    model-viewer {
      width: 100%;
      height: 100vh;
      background: white;
    }
    /* Панель кнопок */
    .button-panel {
      position: fixed;
      bottom: 60px;
      left: 0;
      right: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      z-index: 10000;
      pointer-events: none;
      padding: 0 10px;
    }
    .button-panel button {
      pointer-events: auto;
      width: min(270px, 40vw);
      height: auto;
      aspect-ratio: 1/1;
      border-radius: 50%;
      border: none;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(12px);
      color: white;
      font-size: min(100px, 15vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }
    .button-panel button:active {
      transform: scale(0.95);
    }
    .button-panel button span {
      font-size: min(32px, 5vw);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.9;
    }
    .button-panel button.music-off {
      background: rgba(100, 100, 100, 0.9);
    }
    .button-panel button.music-on {
      background: #007aff;
    }
    .button-panel button:disabled {
      opacity: 0.4;
      transform: none;
      pointer-events: none;
    }
    /* Подсказка сверху */
    .note {
      position: fixed;
      top: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: #666;
      font-size: 14px;
      background: rgba(255,255,255,0.8);
      padding: 8px;
      backdrop-filter: blur(4px);
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="note" id="platformNote">
    ⚡ Tap AR button to view in your space
  </div>

  <model-viewer 
    id="modelViewer"
    src="textured_mesh.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    environment-image="neutral"
    shadow-intensity="1"
    alt="3D model">
  </model-viewer>

  <div class="button-panel">
    <button id="arButton" class="ar-button">
      <span>📱</span>
      <span>AR</span>
    </button>
    <button id="musicButton" class="music-off">
      <span>🔇</span>
      <span>MUSIC</span>
    </button>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    (function() {
      const modelViewer = document.getElementById('modelViewer');
      const arButton = document.getElementById('arButton');
      const musicButton = document.getElementById('musicButton');
      const bgMusic = document.getElementById('bgMusic');
      const platformNote = document.getElementById('platformNote');

      // --- Функция обновления состояния AR-кнопки ---
      function updateARStatus() {
        if (modelViewer.canActivateAR) {
          arButton.disabled = false;
          platformNote.innerHTML = '⚡ Tap AR button to view in your space';
        } else {
          arButton.disabled = true;
          platformNote.innerHTML = '❌ AR not supported on this device/browser.';
        }
      }

      // --- Ждём загрузки модели и проверяем поддержку AR ---
      if (modelViewer.loaded) {
        updateARStatus();
      } else {
        modelViewer.addEventListener('load', updateARStatus);
      }

      // --- AR кнопка: запуск AR ---
      arButton.addEventListener('click', () => {
        if (modelViewer.canActivateAR) {
          modelViewer.activateAR();
        } else {
          alert('AR is not available on this device.');
        }
      });

      // --- Музыка: переключение ---
      let isPlaying = false;
      musicButton.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isPlaying) {
          bgMusic.pause();
          musicButton.classList.remove('music-on');
          musicButton.classList.add('music-off');
          musicButton.innerHTML = '<span>🔇</span><span>MUSIC</span>';
          isPlaying = false;
        } else {
          bgMusic.play()
            .then(() => {
              musicButton.classList.remove('music-off');
              musicButton.classList.add('music-on');
              musicButton.innerHTML = '<span>🔊</span><span>MUSIC</span>';
              isPlaying = true;
            })
            .catch((err) => {
              console.warn('Audio play failed:', err);
              alert('Could not play music. Tap again or check browser permissions.');
            });
        }
      });

      // Сброс иконки, если трек закончился
      bgMusic.addEventListener('ended', () => {
        isPlaying = false;
        musicButton.classList.remove('music-on');
        musicButton.classList.add('music-off');
        musicButton.innerHTML = '<span>🔇</span><span>MUSIC</span>';
      });

      // Определение платформы (просто информационно)
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      if (isIOS) {
        platformNote.innerHTML = '📱 On iOS, music will not play during AR (system limitation).';
      }
    })();
  </script>
</body>
</html>
