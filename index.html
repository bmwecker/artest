<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR модель</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: sans-serif;
    }
    model-viewer {
      width: 100%;
      height: 100vh;
      background-color: #ffffff;
    }
    /* Стили для кастомной кнопки AR */
    .ar-button {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #007aff;
      color: white;
      border: none;
      border-radius: 40px;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 1000;
      cursor: pointer;
      transition: background 0.2s;
    }
    .ar-button:hover {
      background: #0051a8;
    }
    .ar-button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <model-viewer 
    id="modelViewer"
    src="textured_mesh.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    rotation-per-second="30deg"
    environment-image="neutral"
    shadow-intensity="1"
    exposure="0.8"
    alt="3D модель">
  </model-viewer>

  <button id="arButton" class="ar-button">📱 Смотреть в AR</button>

  <script>
    const modelViewer = document.getElementById('modelViewer');
    const arButton = document.getElementById('arButton');

    // Проверяем, поддерживается ли AR
    modelViewer.addEventListener('load', () => {
      if (modelViewer.canActivateAR) {
        arButton.disabled = false;
        arButton.textContent = '📱 Смотреть в AR';
      } else {
        arButton.disabled = true;
        arButton.textContent = 'AR не поддерживается на этом устройстве';
      }
    });

    // Обработчик клика на кнопку
    arButton.addEventListener('click', () => {
      if (modelViewer.canActivateAR) {
        modelViewer.activateAR();
      } else {
        alert('К сожалению, ваше устройство не поддерживает AR.');
      }
    });
  </script>
</body>
</html>
